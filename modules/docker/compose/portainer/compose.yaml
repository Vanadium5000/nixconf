services:
  portainer:
    image: portainer/portainer-ce:lts
    container_name: portainer
    command:
      - --http-enabled
      - --bind=:9000
      - --admin-password-file=/run/secrets/portainer_admin_password
    restart: always
    secrets:
      - portainer_admin_password
    ports:
      - 127.0.0.1:9000:9000/tcp
      - 127.0.0.1:9443:9443/tcp
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data

secrets:
  portainer_admin_password:
    file: ${PORTAINER_ADMIN_PASSWORD_FILE:?Portainer admin password credential is missing}

volumes:
  portainer-data:
    name: portainer_data
