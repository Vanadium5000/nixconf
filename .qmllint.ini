[General]
DisableDefaultImports=false
MaxWarnings=-1

[Warnings]
# Quickshell qmltypes intentionally mark shell window types as uncreatable even
# though qs instantiates them; upstream documents PanelWindow as a qmlls caveat.
UncreatableType=disable

# Keep qmllint useful for broken imports/types while avoiding warnings that are
# noisy for Quickshell's runtime models, dynamic singleton data, and delegates.
AliasCycle=disable
BadSignalHandlerParameters=disable
MissingProperty=disable
PropertyOverride=disable
UnqualifiedAccess=disable
